<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 발표자? 🎯 비장의 룰렛</title>
    <!-- Tailwind CSS for modern responsive layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for stylish Korean typography -->
    <link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <!-- Canvas Confetti Library for victory celebrations -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            font-family: 'Gmarket Sans', 'Inter', sans-serif;
            /* Classic school chalkboard green with deep corners for chalk dust depth */
            background: radial-gradient(circle, #1a3f28 10%, #0d2114 100%);
            position: relative;
            overflow-x: hidden;
        }
        /* Simulated chalk dust atmosphere overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
            background-size: 32px 32px;
            pointer-events: none;
            opacity: 0.6;
            z-index: 0;
        }
        /* Chalk handwriting typography effects */
        .chalk-white {
            color: #f8fafc;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.6), 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .chalk-yellow {
            color: #fef08a;
            text-shadow: 0 0 2px rgba(254, 240, 138, 0.6), 0 0 8px rgba(254, 240, 138, 0.3);
        }
        .chalk-pink {
            color: #fbcfe8;
            text-shadow: 0 0 2px rgba(251, 207, 232, 0.6), 0 0 8px rgba(251, 207, 232, 0.3);
        }
        /* Hand-drawn chalk borders for retro board feel */
        .chalk-board {
            background: rgba(13, 33, 20, 0.7);
            border: 3px dashed rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6), 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        /* Chalk line buttons with bouncy tap reaction */
        .chalk-btn {
            border: 2px solid rgba(254, 240, 138, 0.6);
            background: rgba(254, 240, 138, 0.1);
            text-shadow: 0 0 4px rgba(254, 240, 138, 0.4);
            transition: all 0.2s ease;
        }
        .chalk-btn:hover {
            background: rgba(254, 240, 138, 0.2);
            box-shadow: 0 0 15px rgba(254, 240, 138, 0.4);
            transform: translateY(-2px);
        }
        .chalk-btn:active {
            transform: translateY(1px);
        }
        /* Custom scrollbar to match chalk vibe */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between p-4 md:p-8">

    <!-- Header Section -->
    <header class="text-center py-4 relative z-10">
        <h1 class="text-3xl md:text-5xl font-extrabold tracking-wider chalk-yellow">
            ✏️ 오늘의 발표자는 누구? 🎯
        </h1>
        <p class="text-sm md:text-base chalk-white mt-3 opacity-90 font-mono">
            두근두근! 운명의 분필 룰렛을 돌려보세요
        </p>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-grow flex flex-col lg:flex-row items-center justify-center gap-8 max-w-6xl w-full mx-auto my-4 relative z-10">
        
        <!-- Center Section: Roulette Wheel -->
        <div class="flex-1 flex flex-col items-center justify-center relative w-full max-w-[450px]">
            <!-- Roulette Pin (Pointer) at the top -->
            <div class="absolute -top-1 z-20 w-8 h-10 flex flex-col items-center">
                <!-- Golden Pointer shape using SVG -->
                <svg class="w-8 h-8 filter drop-shadow-[0_4px_6px_rgba(0,0,0,0.6)]" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21L3 8C3 8 5.5 3 12 3C18.5 3 21 8 21 8L12 21Z" fill="#FBBF24" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
                </svg>
                <!-- Glowing point -->
                <div class="w-3 h-3 bg-white rounded-full -mt-2 animate-ping absolute"></div>
            </div>

            <!-- Canvas Container with hand-drawn chalk ring border -->
            <div class="relative bg-black/10 p-4 rounded-full border-4 border-double border-white/30 shadow-2xl flex items-center justify-center">
                <canvas id="rouletteCanvas" width="380" height="380" class="rounded-full max-w-full aspect-square"></canvas>
                <!-- Inner Decorative Center Ring -->
                <div class="absolute w-12 h-12 bg-emerald-950 border-4 border-amber-400 rounded-full flex items-center justify-center shadow-lg z-10 pointer-events-none">
                    <div class="w-3 h-3 bg-amber-400 rounded-full animate-pulse"></div>
                </div>
            </div>

            <!-- Spin Trigger Button Panel -->
            <div class="mt-6 w-full px-4 text-center">
                <button id="spinBtn" class="chalk-btn w-full md:w-64 py-4 px-8 rounded-2xl text-yellow-100 font-bold text-xl md:text-2xl tracking-widest shadow-lg transform transition duration-200 focus:outline-none focus:ring-4 focus:ring-yellow-300/40">
                    🎲 룰렛 돌리기!
                </button>
            </div>
        </div>

        <!-- Right Section: Student List & Control Panel -->
        <div class="w-full lg:w-80 chalk-board rounded-2xl p-6 flex flex-col h-[400px] lg:h-[480px]">
            <h2 class="text-lg font-bold chalk-pink mb-3 flex items-center gap-2 border-b-2 border-dashed border-white/20 pb-2">
                👥 대기 학생 명단 (<span id="studentCount">8</span>명)
            </h2>
            
            <!-- Dynamic list scroll area -->
            <div id="studentList" class="flex-grow overflow-y-auto space-y-2 pr-1 mb-4">
                <!-- Names will be dynamically injected here -->
            </div>

            <!-- Add student form -->
            <div class="space-y-2 mt-auto">
                <div class="flex gap-2">
                    <input id="newStudentInput" type="text" placeholder="이름을 입력하세요" maxlength="8" class="flex-grow bg-emerald-950/80 border border-white/20 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 text-white placeholder-emerald-700/60">
                    <button id="addStudentBtn" class="bg-yellow-400/20 hover:bg-yellow-400/30 border border-yellow-400/50 text-yellow-100 font-bold px-4 py-2 rounded-xl text-sm transition active:scale-95">
                        추가
                    </button>
                </div>
                <button id="resetBtn" class="w-full text-xs text-slate-400 hover:text-rose-300 py-1 transition text-right">
                    ⚠️ 명단 전체 비우기
                </button>
            </div>
        </div>
    </main>

    <!-- Beautiful Custom Success Modal (No Alerts Allowed!) -->
    <div id="winnerModal" class="fixed inset-0 bg-black/85 backdrop-blur-sm flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-gradient-to-br from-emerald-950 to-stone-900 border-4 border-amber-800/80 p-8 rounded-3xl max-w-sm w-full mx-4 text-center shadow-2xl transform scale-90 transition-transform duration-300 relative overflow-hidden">
            <!-- Blackboard border line style inside modal -->
            <div class="absolute inset-2 border border-dashed border-white/10 rounded-2xl pointer-events-none"></div>

            <div class="text-6xl mb-4 animate-bounce">🔔</div>
            <h3 class="text-xl chalk-pink font-semibold tracking-wider">축하합니다! 오늘의 당첨자</h3>
            
            <!-- Winning Student Name Holder (Chalk Yellow Effect) -->
            <div id="winnerName" class="text-4xl md:text-5xl font-black chalk-yellow my-6 drop-shadow-md">
                홍길동
            </div>

            <div class="space-y-2 relative z-10">
                <button id="excludeWinnerBtn" class="w-full py-3 px-6 rounded-xl bg-rose-950/80 hover:bg-rose-900 border border-rose-500/30 text-rose-200 font-bold transition active:scale-95 flex items-center justify-center gap-2">
                    🚫 다음 판에서 제외하기
                </button>
                <button id="closeModalBtn" class="w-full py-3 px-6 rounded-xl bg-stone-800 hover:bg-stone-700 border border-white/10 text-slate-200 font-semibold transition active:scale-95">
                    확인 완료
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs chalk-white opacity-60 font-mono relative z-10">
        Made with AI Vibe Coding &copy; 2026. 신나고 알찬 수업을 응원합니다!
    </footer>

    <script>
        // Default startup student list
        let students = ['김민준', '이서연', '박예준', '최지우', '정우진', '강서현', '윤하은', '조민재'];
        
        // Colors for roulette slices (Vibrant, high-contrast, beautiful palette)
        const sliceColors = [
            '#FF5E7E', '#FF9F43', '#FECA57', '#1DD1A1', 
            '#00D2D3', '#54A0FF', '#5F27CD', '#C56CF0'
        ];

        // Core UI selectors
        const canvas = document.getElementById('rouletteCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const studentListEl = document.getElementById('studentList');
        const studentCountEl = document.getElementById('studentCount');
        const newStudentInput = document.getElementById('newStudentInput');
        const addStudentBtn = document.getElementById('addStudentBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // Modal Selectors
        const winnerModal = document.getElementById('winnerModal');
        const winnerNameEl = document.getElementById('winnerName');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const excludeWinnerBtn = document.getElementById('excludeWinnerBtn');

        // Physics State variables
        let startAngle = 0;
        let isSpinning = false;
        let currentWinner = "";

        // Web Audio API Synth setup for SFX without external files!
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTickSound() {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.04);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch (e) { /* AudioContext might be blocked until user gesture */ }
        }

        function playVictorySound() {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const now = audioCtx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 (Arpeggio!)
                notes.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.1);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.1);
                    gain.gain.linearRampToValueAtTime(0.01, now + idx * 0.1 + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + idx * 0.1);
                    osc.stop(now + idx * 0.1 + 0.3);
                });
            } catch (e) {}
        }

        // Main function to draw the roulette wheel on Canvas
        function drawRoulette() {
            const numSlices = students.length;
            
            // Clear canvas cleanly
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw visual fallback if no students left
            if (numSlices === 0) {
                ctx.beginPath();
                ctx.arc(190, 190, 175, 0, 2 * Math.PI);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#475569';
                ctx.stroke();
                
                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 16px Gmarket Sans';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('학생 명단을 추가해주세요!', 190, 190);
                return;
            }

            const sliceAngle = (2 * Math.PI) / numSlices;
            
            // Render each segment slice
            for (let i = 0; i < numSlices; i++) {
                const angle = startAngle + i * sliceAngle;
                
                ctx.beginPath();
                ctx.moveTo(190, 190);
                // Draw arc slightly inward from outer boundary
                ctx.arc(190, 190, 175, angle, angle + sliceAngle);
                ctx.closePath();
                
                // Color cyclic assignment from palette
                ctx.fillStyle = sliceColors[i % sliceColors.length];
                ctx.fill();
                
                // Fine inner border lines
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#0f172a';
                ctx.stroke();
                
                // Draw Text label
                ctx.save();
                ctx.translate(190, 190);
                ctx.rotate(angle + sliceAngle / 2);
                
                ctx.fillStyle = '#FFFFFF';
                // Font size scales slightly based on list length
                const fontSize = numSlices > 12 ? '11px' : (numSlices > 8 ? '13px' : '15px');
                ctx.font = `bold ${fontSize} Gmarket Sans`;
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                
                // Text shadow for high readability
                ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                
                ctx.fillText(students[i], 160, 0);
                ctx.restore();
            }
            
            // Draw fancy outer boundary ring
            ctx.beginPath();
            ctx.arc(190, 190, 175, 0, 2 * Math.PI);
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#38bdf8';
            ctx.stroke();
        }

        // Rotation & Physics properties
        let spinAngleStart = 0;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let lastTickAngle = 0;

        function rotateWheel() {
            spinTime += 30;
            if (spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            
            // Dynamic ease-out slow-down math calculations
        const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
        startAngle += (spinAngle * Math.PI / 180);
        drawRoulette();
        
        // Play tick sound whenever a new slice crosses the boundary threshold
        const sliceAngle = (2 * Math.PI) / students.length;
        const currentAngleMod = startAngle % (2 * Math.PI);
        const rawTickDiff = Math.abs(currentAngleMod - lastTickAngle);
        if (rawTickDiff > sliceAngle) {
            playTickSound();
            lastTickAngle = currentAngleMod;
        }
        
        requestAnimationFrame(rotateWheel);
    }

    // Standard robust quadratic ease-out helper
    function easeOut(t, b, c, d) {
        const ts = (t /= d) * t;
        const tc = ts * t;
        return b + c * (tc + -3 * ts + 3 * t);
    }

    function stopRotateWheel() {
        isSpinning = false;
        spinBtn.disabled = false;
        spinBtn.innerText = "🎲 룰렛 다시 돌리기!";
        spinBtn.classList.remove('opacity-50', 'cursor-not-allowed');

        const degrees = startAngle * 180 / Math.PI;
        const arcl = 360 / students.length;
        
        // Pointer is exactly at top (-90 degrees adjustment)
        const index = Math.floor((360 - (degrees % 360) - 90 + 360) % 360 / arcl);
        
        currentWinner = students[index];
        showWinner(currentWinner);
    }

    // Celebrate with confetti and reveal custom result panel
    function showWinner(name) {
        winnerNameEl.innerText = name;
        
        // Unhide and animate popup
        winnerModal.classList.remove('hidden');
        setTimeout(() => {
            winnerModal.classList.remove('opacity-0');
            winnerModal.querySelector('div').classList.remove('scale-90');
            winnerModal.querySelector('div').classList.add('scale-100');
        }, 10);

        // Pop Confetti explosions!
        confetti({
            particleCount: 150,
            spread: 80,
            origin: { y: 0.6 }
        });
        playVictorySound();
    }

    function closeModal() {
        winnerModal.classList.add('opacity-0');
        winnerModal.querySelector('div').classList.remove('scale-100');
        winnerModal.querySelector('div').classList.add('scale-90');
        setTimeout(() => {
            winnerModal.classList.add('hidden');
        }, 300);
    }

    // Student List Panel UI Generator
    function updateStudentListUI() {
        studentListEl.innerHTML = '';
        studentCountEl.innerText = students.length;
        
        students.forEach((name, idx) => {
            const item = document.createElement('div');
            // Styled to look like a neat box drawn on a blackboard with chalk
            item.className = "flex justify-between items-center bg-white/5 border border-white/10 px-4 py-2.5 rounded-xl hover:bg-white/10 transition";
            
            const nameSpan = document.createElement('span');
            nameSpan.className = "text-sm font-semibold tracking-wide text-stone-200";
            nameSpan.innerText = `${idx + 1}. ${name}`;
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = "text-stone-400 hover:text-rose-300 transition text-lg px-1";
            deleteBtn.innerHTML = "&times;";
            deleteBtn.title = "삭제";
            deleteBtn.onclick = () => {
                if (isSpinning) return;
                students.splice(idx, 1);
                updateStudentListUI();
                drawRoulette();
            };
            
            item.appendChild(nameSpan);
            item.appendChild(deleteBtn);
            studentListEl.appendChild(item);
        });
    }

    // Exclude the current winner and refresh UI
    excludeWinnerBtn.onclick = () => {
        const index = students.indexOf(currentWinner);
        if (index > -1) {
            students.splice(index, 1);
        }
        updateStudentListUI();
        drawRoulette();
        closeModal();
    };

    closeModalBtn.onclick = closeModal;

    // Trigger start spin mechanism
    spinBtn.onclick = () => {
        if (isSpinning) return;
        if (students.length === 0) {
            alertBox("✏️ 칠판에 적힌 학생 이름이 없어요! 명단을 먼저 채워주세요.");
            return;
        }

        isSpinning = true;
        spinBtn.disabled = true;
        spinBtn.innerText = "⚡ 분필 굴러가는 중...";
        spinBtn.classList.add('opacity-50', 'cursor-not-allowed');
        
        // Random spin metrics configurations
        spinAngleStart = Math.random() * 10 + 15; // Starting spin speed coefficient
        spinTime = 0;
        spinTimeTotal = Math.random() * 3000 + 4000; // Duration limit
        lastTickAngle = startAngle % (2 * Math.PI);
        
        rotateWheel();
    };

    // Add New Student controls
    function addStudent() {
        const name = newStudentInput.value.trim();
        if (name === "") return;
        if (students.includes(name)) {
            alertBox("✏️ 이미 칠판에 적혀 있는 학생 이름입니다!");
            return;
        }
        students.push(name);
        newStudentInput.value = '';
        updateStudentListUI();
        drawRoulette();
        
        // Focus adjustment helper
        newStudentInput.focus();
    }

    addStudentBtn.onclick = addStudent;
    newStudentInput.onkeypress = (e) => {
        if (e.key === 'Enter') addStudent();
    };

    // Complete reset back to default dataset
    resetBtn.onclick = () => {
        if (isSpinning) return;
        students = [];
        updateStudentListUI();
        drawRoulette();
    };

    // Fallback custom toast instead of system block alerts
    function alertBox(msg) {
        const toast = document.createElement('div');
        toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 z-50 bg-emerald-950 border border-yellow-400/50 text-white font-semibold py-3 px-6 rounded-2xl shadow-xl transition-all duration-300 opacity-0 scale-95 flex items-center gap-2";
        toast.innerHTML = `<span class="text-yellow-400">✏️</span> ${msg}`;
        document.body.appendChild(toast);
        
        // Slide in animation delay
        setTimeout(() => {
            toast.classList.remove('opacity-0', 'scale-95');
            toast.classList.add('opacity-100', 'scale-100');
        }, 10);
        
        // Slide out cleanup
        setTimeout(() => {
            toast.classList.add('opacity-0', 'scale-95');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Initialize display setup onload
    window.onload = () => {
        updateStudentListUI();
        drawRoulette();
    };
</script>
</body>
</html>
